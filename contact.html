<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

<header class="navbar">
  <div class="logo">
    <span></span>
    <h1>WM</h1>
  </div>

  <nav>
    <a href="index.html">Accueil</a>
    <a href="competences.html">Compétences</a>
    <a href="about.html">À propos</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<main>
  <section class="contact-section">

    <p class="tag center">Contact</p>
    <h2 class="section-title">Prenons contact</h2>
    <p class="section-subtitle">Pour échanger, collaborer ou simplement dire bonjour.</p>

    <div class="contact-container">

      <div class="contact-info">

        <a href="mailto:walaemorabet@gmail.com" class="contact-card">
          <div class="contact-icon">✉️</div>
          <div>
            <p>Email</p>
            <strong>walaemorabet@gmail.com</strong>
          </div>
        </a>

        <a href="tel:+33744878759" class="contact-card">
          <div class="contact-icon">📞</div>
          <div>
            <p>Téléphone</p>
            <strong>07 44 87 87 59</strong>
          </div>
        </a>

        <a href="#" class="contact-card">
          <div class="contact-icon">in</div>
          <div>
            <p>LinkedIn</p>
            <strong>linkedin.com/in/walae-morabet</strong>
          </div>
        </a>

      </div>

      <form class="contact-form" id="contactForm">

        <div class="form-row">
          <div class="form-group">
            <label for="name">Nom</label>
            <input type="text" id="name" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="subject">Sujet</label>
          <input type="text" id="subject" required />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="6" required></textarea>
        </div>

        <button type="submit" class="btn" id="sendBtn">
          Envoyer le message ✈
        </button>

      </form>

    </div>

  </section>
</main>

<footer>
  © 2026 — Portfolio personnel
</footer>

<script>
    const form = document.getElementById("contactForm");
    const btn = document.getElementById("sendBtn");
  
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzm8ZBtHfLz7LMZ8Xv4wu-P1EnRQm9DvHrAyCPYDov6Lkey5TVjwoxhLOzuKotOCizng/exec";
  
    form.addEventListener("submit", function(e) {
      e.preventDefault();
  
      const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        subject: document.getElementById("subject").value,
        message: document.getElementById("message").value
      };
  
      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(() => {
        btn.textContent = "Message envoyé ✓";
        form.reset();
  
        setTimeout(() => {
          btn.textContent = "Envoyer le message ✈";
        }, 3000);
      })
      .catch(() => {
        btn.textContent = "Erreur d’envoi";
      });
    });
  </script>

</body>
</html>
